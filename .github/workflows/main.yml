name: Build Flutter iOS IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Print pubspec.lock
        run: |
          echo "pubspec.lock contents:";
          cat pubspec.lock || true

      - name: Print outdated dependencies summary
        run: |
          echo "Running 'flutter pub outdated' summary (non-fatal)";
          flutter pub outdated --no-dev || true

      - name: Ensure iOS project exists
        run: |
          if [ ! -d ios ] || [ ! -f ios/Runner.xcodeproj/project.pbxproj ]; then
            echo "iOS project not found; generating with 'flutter create --platforms=ios .'";
            flutter create --platforms=ios .;
          else
            echo "iOS project present";
          fi

      - name: "CocoaPods: print versions and repo update"
        working-directory: ./ios
        run: |
          echo "pod version:"; pod --version || true
          echo "xcodebuild version:"; xcodebuild -version || true
          echo "Listing ios/ directory:"; ls -la .. || true
          if [ -f Podfile ]; then
            echo "Podfile.lock contents:"; cat Podfile.lock || true
            echo "Updating pod repo and installing pods (may take a while)";
            pod repo update || true
            pod install --repo-update || true
          else
            echo "No Podfile found; skipping pod install";
          fi

      - name: Pre-build cleanup
        run: |
          echo "Running flutter clean to remove stale build artifacts";
          flutter clean || true

      # Keep workflow minimal: we only build an unsigned IPA and upload it as an artifact.
      # Removed analysis/tests to avoid unrelated failures — this workflow's sole purpose is to produce an IPA.

      - name: Build iOS IPA (unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Inspect IPA output
        run: |
          echo "IPA files in build/ios/ipa:"
          ls -la build/ios/ipa || true

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
