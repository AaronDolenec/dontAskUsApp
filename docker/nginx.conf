server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for JS/CSS/HTML (on-the-fly)
    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/json image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    # If .gz precompressed files exist, prefer them (gzip_static module)
    gzip_static on;

    # Cache static hashed assets for a long time
    location ~* \\.(?:js|css|svg|png|jpg|jpeg|gif|webp|woff2|woff|ttf|eot|json)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Serve index.html for all other routes (SPA fallback)
    location / {
        # Serve precompressed .br/.gz files if present and client accepts them
        # Note: nginx brotli module not included by default; we precompress gzip files and enable gzip_static above.
        try_files $uri $uri/ /index.html;
    }

    # Ensure index.html is not cached aggressively so updates propagate
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # Disable access logs to reduce IO (change if you need them)
    access_log off;
    error_log /var/log/nginx/error.log warn;
}
