<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="dontAskUs – Group-based daily questions, voting, and streaks. Play, vote, and connect with friends in private groups.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dont_ask_us">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icon/app_icon.png"/>

  <title>dontAskUs</title>
  <link rel="manifest" href="manifest.json">

  <style>
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #667eea;
      color: white;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading p { margin-top: 20px; }
    .error { color: #ff6b6b; background: #1a1a2e; padding: 20px; margin: 10px; border-radius: 8px; max-width: 90%; word-break: break-word; }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="status">Loading dontAskUs...</p>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script>
    // Show errors on screen for debugging
    window.onerror = function(msg, url, line, col, error) {
      document.getElementById('status').textContent = 'Error loading app';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML = '<strong>Error:</strong> ' + msg + '<br><small>' + url + ':' + line + '</small>';
      document.querySelector('.spinner').style.display = 'none';
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('status').textContent = 'Error loading app';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML = '<strong>Promise Error:</strong> ' + (e.reason?.message || e.reason || 'Unknown error');
      document.querySelector('.spinner').style.display = 'none';
    });
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
          .register('firebase-messaging-sw.js')
          .then((reg) => console.log('SW registered', reg))
          .catch((err) => console.error('SW registration failed', err));
    }
  </script>
</body>
</html>
