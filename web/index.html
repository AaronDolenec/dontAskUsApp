<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="dontAskUs – Group-based daily questions, voting, and streaks. Play, vote, and connect with friends in private groups.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dont_ask_us">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icon/app_icon.png"/>

  <title>dontAskUs</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex-direction: column;
      z-index: 9999;
      opacity: 1;
      transition: opacity 220ms ease;
    }
    .loading.loading-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading p { margin-top: 20px; }
    .error { color: #ff6b6b; background: #1a1a2e; padding: 20px; margin: 10px; border-radius: 8px; max-width: 90%; word-break: break-word; }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="status">Loading dontAskUs...</p>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script>
    const loadingRoot = document.getElementById('loading');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const spinnerEl = document.querySelector('.spinner');

    function hideLoadingShell() {
      if (!loadingRoot || loadingRoot.classList.contains('loading-hidden')) return;
      loadingRoot.classList.add('loading-hidden');
      setTimeout(() => loadingRoot.remove(), 260);
    }

    function showLoadError(title, details) {
      if (statusEl) statusEl.textContent = 'Error loading app';
      if (errorEl) {
        errorEl.style.display = 'block';
        errorEl.innerHTML = `<strong>${title}</strong> ${details}`;
      }
      if (spinnerEl) spinnerEl.style.display = 'none';
    }

    // Show errors on screen for debugging
    window.onerror = function(msg, url, line, col, error) {
      showLoadError('Error:', `${msg}<br><small>${url}:${line}</small>`);
      return false;
    };

    window.addEventListener('unhandledrejection', function(e) {
      showLoadError('Promise Error:', (e.reason?.message || e.reason || 'Unknown error'));
    });

    window.addEventListener('app-shell-status', function(e) {
      if (statusEl && e?.detail) {
        statusEl.textContent = String(e.detail);
      }
    });

    window.addEventListener('app-started', hideLoadingShell);

    window.addEventListener('flutter-first-frame', function() {
      hideLoadingShell();
    });
  </script>
  <script src="firebase-web-config.js"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function hasRealFirebaseValue(value) {
      return typeof value === 'string' && value.trim().length > 0 && !value.startsWith('YOUR_');
    }

    function hasValidFirebaseConfig(config) {
      if (!config || typeof config !== 'object') return false;
      return (
        hasRealFirebaseValue(config.apiKey) &&
        hasRealFirebaseValue(config.projectId) &&
        hasRealFirebaseValue(config.messagingSenderId) &&
        hasRealFirebaseValue(config.appId)
      );
    }

    if ('serviceWorker' in navigator) {
      const firebaseConfig = window.FIREBASE_WEB_CONFIG || null;
      if (hasValidFirebaseConfig(firebaseConfig)) {
        navigator.serviceWorker
            .register('firebase-messaging-sw.js', {
              scope: '/firebase-cloud-messaging-push-scope',
            })
            .then((reg) => console.log('Firebase messaging SW registered', reg.scope))
            .catch((err) => console.warn('Firebase messaging SW registration skipped:', err));
      } else {
        console.info('Firebase messaging SW disabled: missing Firebase web config values.');
      }
    }
  </script>
</body>
</html>
