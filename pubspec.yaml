name: dont_ask_us
description: A group-based daily question and voting platform.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # HTTP & WebSocket
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # UI Components
  shimmer: ^3.0.0
  fl_chart: ^0.65.0

  # Utilities
  intl: ^0.18.0
  share_plus: ^7.2.0
  qr_flutter: ^4.1.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0

  # Cupertino Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Assets (uncomment when adding assets)
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # Fonts (uncomment when adding custom fonts)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700
